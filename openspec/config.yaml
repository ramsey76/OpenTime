schema: spec-driven

context: |
  Project overview:
  TimeManagement is a time tracking and management application so that employees can
  easily log their work hours, and track that against projects.
  
  Tech stack:
  
  Backend:
  - C#
  - .NET 10
  - ASP.NET Core
  - Entity Framework Core
  - SQL Server

  Frontend:
  - Vue.js
  - TypeScript
  - Pinia
  - Tailwind CSS

  Hosting:
  - Azure App Service (API, Front-end)
  - Azure Functions (Background jobs)
  - PostgreSQL (Database)

  Local development:
  - Podman (Docker Compatible containerization)
  - Visual Studio Code (IDE)  

  namespace for coding: TimeManagement

